name: Greetings Pipeline

on:
  workflow_dispatch:
    inputs:
      rgname:
        description: Please typr proper rgname
        default: rgdemo
        type: choice
        options:
          - rgdemo-dev
          - rgdemo-prod
          - rgdemo-qa



# pipeline level pe agent ko assign ni kar sakte

jobs:

  Linux-greeting:
    name: reply by linux $name

    runs-on: ubuntu-slim
    steps:
      - name: Hello Audience 
        run: echo "Hello Guys Whats's up, I am good ${{ github.event.inputs.rgname }}-${{ RUNNER.OS }} "     
