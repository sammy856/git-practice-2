name: Greetings Pipeline

on:
  workflow_dispatch:

# pipeline level pe agent ko assign ni kar sakte

jobs:
  Windows-greeting:
    name: Greeting Audience
    runs-on: windows-latest
    steps:
      - name: Hello Audience
        run: ech "Hello Guys Whats's up"
  Linux-greeting:
    name: Greeting Audience by linux
    needs: Windows-greeting
    runs-on: ubuntu-slim
    steps:
      - name: Hello Audience
        run: echo "Hello Guys Whats's up"     
