name: Tearraform infra

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      
jobs:
  terraform_init:
    name: Terraform Init
    runs-on: ubuntu-latest
    steps:
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Terraform Init
        run: terraform init      

  
  
    



