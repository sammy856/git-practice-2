name: Tearraform infra Create

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read
  
jobs: 
  terraform:
    name: Terraform Infra
    runs-on: ubuntu-latest
    environment: dev
    
    defaults:
      run:
        working-directory: environment/dev
    steps:
      - name: Checkout   
        uses: actions/checkout@v4
    
      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Debug secrets
        run: |
          echo "CLIENT_ID=${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "TENANT_ID=${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "SUB_ID=${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
      
    

 

      
    



    


    

    

    
    
 
     
