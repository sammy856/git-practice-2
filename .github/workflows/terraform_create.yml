name: Tearraform infra Create

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master 
      
      
jobs:
  terraform_create:
    name: Terraform Infra Setup 
    runs-on: ubuntu-latest
    steps:
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
    # Paste output of `az ad sp create-for-rbac` as value of secret variable: AZURE_CREDENTIALS
           creds: ${{ secrets.AZURE_CREDENTIALS }} 

      - name: cd into working folder
        run: cd environment/dev

      - name: Terraform Init
        run: terraform -chdir=environment/dev init
        
      - name: Terraform Validate
        run: terraform -chdir=environment/dev validate 

      - name: Terraform Plan
        run: terraform -chdir=environment/dev plan 

      - name: Terraform Apply Auto Approve
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform -chdir=environment/dev apply --auto-approve 

  
  
    



# pipeline level pe agent ko assign ni kar sakte

