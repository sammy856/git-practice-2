name: Tearraform infra Destroy

on:
  workflow_dispatch:

      
jobs:
  terraform_create:
    name: Terraform Infra Setup
    runs-on: ubuntu-latest
    environment:
        name: dev
        url: https://dev.azure.com/jitenderkumar/terraform/_environments/1
    steps:
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
    # Paste output of `az ad sp create-for-rbac` as value of secret variable: AZURE_CREDENTIALS
           creds: ${{ secrets.AZURE_CREDENTIALS }} 

      - name: cd into working folder
        run: cd environment/dev

      - name: Terraform Init
        run: terraform -chdir=environment/dev init
        
      - name: Terraform Validate
        run: terraform -chdir=environment/dev validate 

      - name: Terraform Plan
        run: terraform -chdir=environment/dev plan 

      - name: Terraform Destroy Auto Approve
        run: terraform -chdir=environment/dev destroy --auto-approve

  
  
    



# pipeline level pe agent ko assign ni kar sakte

